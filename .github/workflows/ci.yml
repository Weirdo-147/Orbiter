name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run optional integration tests"
        required: false
        default: false
        type: boolean

jobs:
  checks:
    name: Format, lint, and unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          install-mode: binary

      - name: Run shared CI target
        run: make ci

  integration-tests:
    name: Optional integration tests
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration target
        run: make test-integration
